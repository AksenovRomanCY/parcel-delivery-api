name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-root
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Mypy
        run: poetry run mypy app/

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: delivery
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: delivery
      DB_PORT: "3306"
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"
      REDIS_PASS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev --no-root
      - name: Run migrations
        run: poetry run alembic upgrade head
      - name: Run unit tests
        run: poetry run pytest tests/unit/ --tb=short -q
      - name: Run integration tests
        run: poetry run pytest tests/integration/ --tb=short -q -o asyncio_mode=auto

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t parcel-delivery-api:${{ github.sha }} .
